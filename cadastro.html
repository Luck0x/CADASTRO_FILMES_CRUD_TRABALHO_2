<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Filme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="hamburger" onclick="toggleMenu()">
        ☰
    </button>
    <div class="sidebar">
        <h2>🎬Filmes</h2>
        <a href="index.html">Home</a>
        <a href="cadastro.html">Cadastrar Filme</a>
        <a href="filmes.html">Listar Filmes</a>
        <a href="#" onclick="logout()">Sair</a>
    </div>
    <div class="content">
        <h1>Cadastrar Filme</h1>
        <form id="filmeForm">
            <input
            type="text"
            id="titulo"
            placeholder="Título"
            required>
            <input
            type="text"
            id="genero"
            placeholder="Gênero"
            required>
            <textarea
            id="sinopse"
            placeholder="Sinopse (opcional)">
            </textarea>
            <input
            type="file"
            id="imagem"
            accept="image/*">
            <button type="submit">
            Salvar Filme
            </button>
        </form>
    </div>

<script src="auth.js"></script>
<script src="filmes.js"></script>
<script src="app.js"></script>

</body>
</html>
